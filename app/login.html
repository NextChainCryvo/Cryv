<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Investimentos - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    height: 60px;
    background: #111;
    position: relative;
    z-index: 10;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: none;
    border: none;
  }

  .nav-actions { display: flex; gap: 12px; align-items: center; }

  .btn-open-account {
    background: #F5C518;
    color: #000;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 2px;
  }

  .btn-help {
    background: transparent;
    color: #fff;
    border: 1.5px solid #fff;
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .bg-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .bg-lines svg { width: 100%; height: 100%; }

  .login-card {
    background: #fff;
    width: 100%;
    max-width: 600px;
    padding: 48px 80px 56px;
    position: relative;
    z-index: 5;
    margin: 40px 20px;
  }

  .xp-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }

  .xp-logo-box {
    background: #111;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  .xp-logo-box span {
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .card-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #111;
    margin-bottom: 28px;
  }

  .radio-group {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin-bottom: 24px;
  }

  .radio-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 500;
    color: #111;
    cursor: pointer;
  }

  .radio-label input[type="radio"] { display: none; }

  .radio-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .radio-label input:checked + .radio-circle {
    border-color: #111;
    background: #111;
  }

  .radio-label input:checked + .radio-circle::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
  }

  .input-field {
    width: 100%;
    background: #f0f0f0;
    border: none;
    padding: 18px 16px;
    font-size: 15px;
    color: #555;
    border-radius: 2px;
    outline: none;
    margin-bottom: 16px;
  }

  .input-field::placeholder { color: #888; }

  .helper-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .link-forgot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: #111;
    text-decoration: none;
    cursor: pointer;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #111;
  }

  .toggle {
    width: 42px;
    height: 24px;
    background: #ccc;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle.on { background: #F5C518; }

  .toggle::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }

  .toggle.on::after { left: 21px; }

  .btn-primary {
    width: 100%;
    background: #d0d0d0;
    color: #888;
    border: none;
    padding: 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    margin-bottom: 12px;
  }

  .btn-secondary {
    width: 100%;
    background: #d8d8d8;
    color: #666;
    border: none;
    padding: 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    margin-bottom: 28px;
  }

  .link-register {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 700;
    color: #111;
    text-decoration: none;
    cursor: pointer;
  }
</style>
</head>
<body>

  <nav class="top-nav">
    <button class="back-btn">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Voltar para home
    </button>
    <div class="nav-actions">
      <button class="btn-open-account">Abra sua conta</button>
      <button class="btn-help">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path stroke-linecap="round" d="M12 16v-4M12 8h.01"/>
        </svg>
        Ajuda
      </button>
    </div>
  </nav>

  <div class="main">
    <div class="bg-lines">
      <svg viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <line x1="200" y1="700" x2="450" y2="200" stroke="#F5C518" stroke-width="1" opacity="0.6"/>
        <line x1="200" y1="700" x2="120" y2="350" stroke="#F5C518" stroke-width="1" opacity="0.6"/>
        <line x1="120" y1="350" x2="450" y2="200" stroke="#F5C518" stroke-width="0.5" opacity="0.3"/>
      </svg>
    </div>

    <div class="login-card">
      <div class="xp-logo">
        <div class="xp-logo-box"><span>Cryv</span></div>
      </div>

      <h1 class="card-title">Boas-vindas!</h1>

      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="tipo" value="pf" checked>
          <span class="radio-circle"></span>
          Pessoa Física
        </label>
        <label class="radio-label">
          <input type="radio" name="tipo" value="pj">
          <span class="radio-circle"></span>
          Pessoa Jurídica
        </label>
      </div>

      <input class="input-field" type="text" placeholder="Número da conta ou CPF">

      <div class="helper-row">
        <a class="link-forgot">
          Esqueci minha conta
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
        <div class="toggle-row">
          Lembrar dados
          <div class="toggle" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>

      <button class="btn-primary">Continuar para senha</button>
      <button class="btn-secondary">Bloquear acessos</button>

      <a class="link-register">
        Ainda não sou cliente
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>

<script>
  document.querySelectorAll('input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.querySelectorAll(`input[name="${this.name}"]`).forEach(r => {
        const circle = r.nextElementSibling;
        circle.style.borderColor = r.checked ? '#111' : '#aaa';
        circle.style.background = r.checked ? '#111' : 'transparent';
      });
    });
  });

  document.querySelectorAll('input[type="radio"]:checked').forEach(r => {
    r.nextElementSibling.style.borderColor = '#111';
    r.nextElementSibling.style.background = '#111';
  });
</script>
</body>
</html>
